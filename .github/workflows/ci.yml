name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          
      - name: Run ruff
        run: ruff check .
        
      - name: Upload ruff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-report
          path: .ruff_report.json
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-cov
          
      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
        
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  badge:
    name: Generate Badge
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: coverage-python-*
          merge-multiple: true
          
      - name: Generate badge
        uses: schneegans/dynamic-badges@v1
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.BADGE_GIST_ID }}
          label: Tests
          message: ${{ needs.test.result == 'success' && 'Passing' || 'Failing' }}
          color: ${{ needs.test.result == 'success' && 'green' || 'red' }}

  notify:
    name: Notify on Failure
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Workflow failed! Repos: TestForge"
          # Uncomment and configure webhook URL for Slack notification
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"CI Failed: TestForge"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
